<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyient Foundation – CRM Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/logo.svg') }}" />
  <!-- Chart.js for the master board charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="app-shell">

    <!-- ============================ SIDEBAR ============================ -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <img src="{{ url_for('static', filename='img/logo.svg') }}" alt="Cyient" />
          <div class="logo-text">
            <div class="brand">Cyient Foundation</div>
            <div class="brand-sub">CRM Dashboard</div>
          </div>
        </div>
        <button class="sidebar-toggle" id="sidebar-toggle" title="Collapse sidebar">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M15 18l-6-6 6-6"/>
          </svg>
        </button>
      </div>

      <nav class="sidebar-nav" id="sidebar-nav">
        <!-- nav items injected by JS -->
      </nav>

      <div class="sidebar-footer">
        <div class="user-card">
          <div class="user-avatar">RK</div>
          <div class="user-info">
            <div class="user-name">Ramesh Kumar</div>
            <div class="user-role">SuperAdmin</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- ============================ MAIN ============================ -->
    <main class="main">

      <header class="topbar">
        <button class="mobile-menu" id="mobile-menu" title="Open menu">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 6h18M3 12h18M3 18h18"/>
          </svg>
        </button>

        <div class="page-heading">
          <div class="breadcrumb"><span id="bc-section">Dashboard</span></div>
          <h1 id="page-title">Master Board</h1>
        </div>

        <div class="topbar-actions">
          <div class="search-wrap">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/>
            </svg>
            <input id="global-search" type="text" placeholder="Search current view…" />
          </div>
          <button class="btn btn-primary" id="primary-action">+ Add</button>
        </div>
      </header>

      <section class="content" id="content">
        <!-- views rendered here -->
        <div class="loader"><div class="spinner"></div><div>Loading…</div></div>
      </section>
    </main>
  </div>

  <!-- ============================ MODAL ============================ -->
  <div class="modal-backdrop" id="modal-backdrop" hidden>
    <div class="modal">
      <header class="modal-header">
        <h3 id="modal-title">Form</h3>
        <button class="modal-close" id="modal-close" title="Close">×</button>
      </header>
      <form id="modal-form" class="modal-form">
        <div id="modal-fields"></div>
        <footer class="modal-footer">
          <button type="button" class="btn btn-ghost" id="modal-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary" id="modal-submit">Save</button>
        </footer>
      </form>
    </div>
  </div>

  <!-- confirmation modal -->
  <div class="modal-backdrop" id="confirm-backdrop" hidden>
    <div class="modal confirm-modal">
      <header class="modal-header">
        <h3>Confirm action</h3>
      </header>
      <div class="modal-body" id="confirm-body">Are you sure?</div>
      <footer class="modal-footer">
        <button type="button" class="btn btn-ghost" id="confirm-cancel">Cancel</button>
        <button type="button" class="btn btn-danger" id="confirm-ok">Delete</button>
      </footer>
    </div>
  </div>

  <!-- toast container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts: order matters -->
  <script src="{{ url_for('static', filename='js/api.js') }}"></script>
  <script src="{{ url_for('static', filename='js/ui.js') }}"></script>
  <script src="{{ url_for('static', filename='js/configs.js') }}"></script>
  <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
