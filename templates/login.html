<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cyient Foundation – Super Admin Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/logo.svg') }}" />
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--gray-50);
            /* Matching existing background */
        }

        .login-wrapper {
            width: 100%;
            max-width: 380px;
            padding: 20px;
        }

        .login-card {
            background: #FFFFFF;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-lg);
            padding: 32px 28px;
            box-shadow: var(--shadow);
        }

        .login-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .login-header img {
            width: 48px;
            height: 48px;
            margin: 0 auto 12px;
            border-radius: 8px;
        }

        .login-header h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--gray-900);
            margin: 0 0 4px 0;
            letter-spacing: -.01em;
        }

        .login-header p {
            font-size: 13px;
            color: var(--gray-500);
            margin: 0;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .login-actions {
            margin-top: 12px;
        }

        .login-actions .btn {
            width: 100%;
            height: 42px;
            font-size: 14px;
            justify-content: center;
        }

        .footer-text {
            text-align: center;
            margin-top: 24px;
            font-size: 11px;
            color: var(--gray-400);
        }
    </style>
</head>

<body>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <img src="{{ url_for('static', filename='img/logo.svg') }}" alt="Cyient Foundation" />
                <h1>Super Admin</h1>
                <p>Sign in to Cyient Foundation CRM</p>
            </div>

            <form action="/" method="GET" class="login-form" id="loginForm">
                <!-- Reusing the exact .field styling from styles.css -->
                <div class="field">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="admin@cyient.com" required />
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required />
                </div>

                <div class="login-actions">
                    <button type="submit" class="btn btn-primary">Sign In</button>
                </div>
            </form>
        </div>


    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const email = document.getElementById('email').value.toLowerCase();
            
            if (email !== 'pavan.kumar@cyient.com' && email !== 'admin@cyient.com') {
                alert('Access Denied: Only Pavan Kumar is authorized to login at this time.');
                return;
            }

            const btn = this.querySelector('.btn-primary');
            btn.innerHTML = 'Signing in...';
            btn.disabled = true;
            setTimeout(() => {
                window.location.href = '/';
            }, 500);
        });
    </script>
</body>

</html>
