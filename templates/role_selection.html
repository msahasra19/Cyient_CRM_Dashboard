<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Select Role – Cyient Foundation</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/logo.svg') }}" />
  <style>
    body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background-color: var(--gray-50);
        flex-direction: column;
    }
    .selection-wrapper {
        width: 100%;
        max-width: 800px;
        padding: 20px;
        text-align: center;
    }
    .selection-header {
        margin-bottom: 40px;
    }
    .selection-header img {
        width: 56px;
        height: 56px;
        margin: 0 auto 16px;
        border-radius: 12px;
    }
    .selection-header h1 {
        font-size: 24px;
        font-weight: 700;
        color: var(--gray-900);
        margin: 0 0 8px 0;
    }
    .selection-header p {
        font-size: 14px;
        color: var(--gray-500);
    }
    .role-cards {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 24px;
    }
    .role-card {
        background: #FFFFFF;
        border: 1px solid var(--gray-200);
        border-radius: var(--radius-lg);
        padding: 40px 24px;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: var(--shadow-sm);
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .role-card:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow);
        border-color: var(--brand-400);
    }
    .role-icon {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: var(--brand-50);
        color: var(--brand-600);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 20px;
    }
    .role-card h2 {
        font-size: 18px;
        font-weight: 600;
        color: var(--gray-800);
        margin: 0 0 8px 0;
    }
    .role-card p {
        font-size: 12px;
        color: var(--gray-500);
        margin: 0;
    }
    @media (max-width: 768px) {
        .role-cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="selection-wrapper">
    <div class="selection-header">
      <img src="{{ url_for('static', filename='img/logo.svg') }}" alt="Cyient Foundation" />
      <h1>Welcome to Cyient Foundation CRM</h1>
      <p>Please select your role to continue</p>
    </div>
    
    <div class="role-cards">
      <div class="role-card" onclick="window.location.href='/login/student'">
        <div class="role-icon">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 14c-4.418 0-8 3.582-8 8h16c0-4.418-3.582-8-8-8z"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </div>
        <h2>Student</h2>
        <p>Access your courses</p>
      </div>
      
      <div class="role-card" onclick="window.location.href='/login/trainer'">
        <div class="role-icon">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 10v6M2 10l10-5 10 5-10 5z"></path>
            <path d="M6 12v5c3 3 9 3 12 0v-5"></path>
          </svg>
        </div>
        <h2>Trainer</h2>
        <p>Manage your classes</p>
      </div>

      <div class="role-card" onclick="window.location.href='/login/superadmin'">
        <div class="role-icon">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
        </div>
        <h2>Super Admin</h2>
        <p>System administration</p>
      </div>
    </div>
  </div>
</body>
</html>
