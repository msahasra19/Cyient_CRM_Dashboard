<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trainer Dashboard - Cyient Foundation</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/logo.svg') }}" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <img src="{{ url_for('static', filename='img/logo.svg') }}" alt="Cyient" />
          <div class="logo-text">
            <div class="brand">Cyient Foundation</div>
            <div class="brand-sub">Trainer Portal</div>
          </div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-heading">People</div>
        <a href="#" class="nav-item active">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="nav-icon"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Feedback
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-card">
          <div class="user-avatar" style="background: linear-gradient(135deg, #DB2777, #9D174D);">T</div>
          <div class="user-info">
            <div class="user-name">Trainer</div>
            <div class="user-role">Trainer</div>
          </div>
        </div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="page-heading">
          <div class="breadcrumb"><span id="bc-section">People</span></div>
          <h1 id="page-title">Submit Feedback</h1>
        </div>
        <div class="topbar-actions">
          <a href="/login" class="btn btn-ghost" id="logout-action" title="Logout">Logout</a>
        </div>
      </header>

      <section class="content" id="content">
        <div class="card" style="max-width: 600px;">
          <div class="card-header" style="display: block;">
            <h3 class="card-title">We value your feedback</h3>
            <div class="card-subtitle">Please share your thoughts, concerns, or suggestions.</div>
          </div>
          <form id="feedback-form" style="display: flex; flex-direction: column; gap: 16px;">
            <div class="field">
              <label>Your Name <span class="req">*</span></label>
              <input type="text" id="provider_name" required placeholder="Enter your name" />
            </div>
            <div class="field">
              <label>Subject <span class="req">*</span></label>
              <input type="text" id="subject" required placeholder="Feedback subject" />
            </div>
            <div class="field">
              <label>Comments <span class="req">*</span></label>
              <textarea id="comments" required rows="5" placeholder="Your feedback details..."></textarea>
            </div>
            <div class="field">
              <label>Rating (1-5) <span class="req">*</span></label>
              <input type="number" id="rating" required min="1" max="5" value="5" />
            </div>
            <div style="margin-top: 10px;">
                <button type="submit" class="btn btn-primary">Submit Feedback</button>
            </div>
          </form>
          <div id="feedback-msg" style="margin-top: 16px; display: none;" class="badge badge-success">Feedback submitted successfully!</div>
        </div>
      </section>
    </main>
  </div>

  <script>
    document.getElementById('feedback-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        provider_name: document.getElementById('provider_name').value,
        provider_role: 'Trainer',
        subject: document.getElementById('subject').value,
        comments: document.getElementById('comments').value,
        rating: parseInt(document.getElementById('rating').value, 10),
        status: 'Pending'
      };

      try {
        const res = await fetch('/api/feedbacks', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (res.ok) {
          document.getElementById('feedback-form').reset();
          document.getElementById('feedback-msg').style.display = 'inline-flex';
          setTimeout(() => { document.getElementById('feedback-msg').style.display = 'none'; }, 3000);
        } else {
          alert('Failed to submit feedback');
        }
      } catch (err) {
        alert('Error: ' + err.message);
      }
    });
  </script>
</body>
</html>
